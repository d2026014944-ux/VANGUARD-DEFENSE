services:
  # O Cérebro da Vanguard (IA + CORE)
  vanguard-engine:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dev
    volumes:
      - .:/app
    environment:
      - ENV=development
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - tactical-net

  # O Servidor de Comunicação (FTS)
  fts-server:
    image: freetakserver/fts:latest
    ports:
      - "8087:8087"
      - "8080:8080"
    networks:
      - tactical-net

networks:
  tactical-net:
    driver: bridge
