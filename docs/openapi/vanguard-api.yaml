openapi: 3.0.3
info:
  title: VANGUARD Module Contracts API
  version: 1.0.0
  description: Contratos de integração VG-VISION, VG-CORE e VG-COMM.
servers:
  - url: https://vanguard.local
paths:
  /vg-vision/detections:
    post:
      summary: Publica detecções normalizadas do VG-VISION
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Detection"
      responses:
        "202":
          description: Lote aceito para conversão CoT
  /vg-core/cot:
    post:
      summary: Converte detecções em CoT XML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Detection"
      responses:
        "200":
          description: CoT XML gerado e validado
          content:
            application/xml:
              schema:
                type: string
        "400":
          description: Payload inválido
  /vg-comm/dispatch:
    post:
      summary: Enfileira pacote CoT para transporte híbrido
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
      responses:
        "202":
          description: CoT aceito na fila prioritária
        "422":
          description: XML-CoT reprovado em validação
components:
  schemas:
    Detection:
      type: object
      required:
        - class
        - confidence
        - location
      properties:
        class:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        location:
          type: array
          minItems: 4
          maxItems: 4
          items:
            type: number
            minimum: 0
            maximum: 1
        lat:
          type: number
          minimum: -90
          maximum: 90
          nullable: true
        lon:
          type: number
          minimum: -180
          maximum: 180
          nullable: true
        hae:
          type: number
